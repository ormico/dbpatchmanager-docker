name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      major: ${{ steps.gitversion.outputs.major }}
      minor: ${{ steps.gitversion.outputs.minor }}
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tag is on main branch
        run: |
          TAG_COMMIT=$(git rev-list -n 1 $GITHUB_REF)
          echo "Tag points to commit: $TAG_COMMIT"

          if git merge-base --is-ancestor $TAG_COMMIT origin/main; then
            echo "[OK] Tag is on main branch"
          else
            echo "[ERROR] Tag $GITHUB_REF_NAME is not on main branch"
            echo "Please only create release tags from the main branch"
            exit 1
          fi

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Display Version
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "MajorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"

  build-and-push:
    needs: version
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
    with:
      tags: |
        ghcr.io/ormico/dbpatchmanager-ci-v2:${{ needs.version.outputs.semVer }}
        ghcr.io/ormico/dbpatchmanager-ci-v2:${{ needs.version.outputs.major }}.${{ needs.version.outputs.minor }}
        ghcr.io/ormico/dbpatchmanager-ci-v2:${{ needs.version.outputs.major }}
        ghcr.io/ormico/dbpatchmanager-ci-v2:latest

  release:
    needs: [version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release v${{ needs.version.outputs.majorMinorPatch }}
          generate_release_notes: true
