name: Scheduled Rebuild

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of month, 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      major: ${{ steps.gitversion.outputs.major }}
      minor: ${{ steps.gitversion.outputs.minor }}
      timestamp: ${{ steps.timestamp.outputs.value }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Generate timestamp
        id: timestamp
        run: echo "value=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Display Version
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "Timestamp: ${{ steps.timestamp.outputs.value }}"

  build-and-push:
    needs: version
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
    with:
      tags: |
        ghcr.io/ormico/dbpatchmanager-ci-v2:v${{ needs.version.outputs.semVer }}-${{ needs.version.outputs.timestamp }}
        ghcr.io/ormico/dbpatchmanager-ci-v2:v${{ needs.version.outputs.semVer }}
        ghcr.io/ormico/dbpatchmanager-ci-v2:v${{ needs.version.outputs.major }}.${{ needs.version.outputs.minor }}
        ghcr.io/ormico/dbpatchmanager-ci-v2:v${{ needs.version.outputs.major }}
        ghcr.io/ormico/dbpatchmanager-ci-v2:latest

  prune:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Prune old rebuild images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="dbpatchmanager-ci-v2"
          OWNER="${{ github.repository_owner }}"
          KEEP=5

          # Determine API path (org vs user)
          if gh api "/orgs/${OWNER}" &>/dev/null; then
            API_BASE="/orgs/${OWNER}"
          else
            API_BASE="/users/${OWNER}"
          fi

          # List rebuild-tagged versions (v*-YYYYMMDDHHmm), sorted newest first, skip KEEP
          gh api --paginate "${API_BASE}/packages/container/${PACKAGE}/versions" \
            --jq '
              [.[] | select(
                .metadata.container.tags | length > 0
              ) | select(
                .metadata.container.tags | any(test("^v[0-9]+\\.[0-9]+\\.[0-9]+-[0-9]{12}$"))
              )] | sort_by(.created_at) | reverse | .['$KEEP':][] | .id
            ' \
          | while read -r id; do
              echo "Deleting version $id"
              gh api --method DELETE "${API_BASE}/packages/container/${PACKAGE}/versions/${id}" || true
            done
